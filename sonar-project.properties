sonar.projectKey=credit-risk-engine
sonar.projectName=Credit Risk Engine TCC
sonar.projectVersion=1.0
sonar.sourceEncoding=UTF-8

# Onde está o código fonte?
sonar.sources=src
# Onde estão os testes?
sonar.tests=tests

# Importante: Onde está o relatório que o Jest gerou?
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclusões (arquivos que não queremos analisar)
sonar.exclusions=node_modules/**, coverage/**